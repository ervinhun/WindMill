services:
  
  #  windmill:
  #    image: windmill
  #    build:
  #      context: .
  #      dockerfile: Dockerfile
  
  postgres:
    image: postgres:16
    container_name: pg-local-windmill
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: WindMill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  pgAdmin:
    image: dpage/pgadmin4
    container_name: pgadmin-windmill
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: